spring.application.name=amazonref-backend
server.port=8081

spring.datasource.url=jdbc:h2:file:./data/amazonrefappdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=amazonref
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

app.h2.tcp.enabled=true
app.security.jwt.secret=amazonref-jwt-secret-key-that-is-long-enough-for-hs384-signing-2026
app.security.jwt.expiration-ms=86400000

app.moderation.scheduler.enabled=true
app.moderation.scheduler.fixed-delay-ms=60000
app.moderation.scheduler.initial-delay-ms=10000
