spring.application.name=youtube-backend-test
server.port=0

spring.datasource.url=jdbc:h2:mem:youtubeappdbtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false

app.h2.tcp.enabled=false
app.security.jwt.secret=youtube-ref-jwt-secret-key-that-is-long-enough-for-hs384-signing-2026
app.security.jwt.expiration-ms=86400000

