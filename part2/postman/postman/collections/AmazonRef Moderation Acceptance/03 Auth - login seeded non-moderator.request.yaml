$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: '{ "username": "{{nonModeratorUsername}}", "password": "{{nonModeratorPassword}}" }'
scripts:
  - type: afterResponse
    code: |-
      pm.test("Non-moderator login returns 200", function () {
        pm.response.to.have.status(200);
      });

      const body = pm.response.json();
      pm.test("Non-moderator token is returned", function () {
        pm.expect(body.token, "token").to.be.a("string").and.not.empty;
      });

      pm.collectionVariables.set("nonModeratorToken", body.token);
    language: text/javascript
order: 3000
